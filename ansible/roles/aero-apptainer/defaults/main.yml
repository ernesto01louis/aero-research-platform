---
# aero-apptainer role defaults.
#
# Apptainer is pinned; the .deb is fetched from the official GitHub release
# and SHA256-verified. Pin recorded in docs/adrs/ADR-002-proxmox-topology.md.
apptainer_version: "1.5.0"
apptainer_deb_url: "https://github.com/apptainer/apptainer/releases/download/v{{ apptainer_version }}/apptainer_{{ apptainer_version }}_amd64.deb"
apptainer_deb_sha256: "fbc27204d0ec0440dfa0ae589089e4b2baf192315b4ac22dfae02b78b28981ea"

# subuid/subgid ranges for unprivileged --fakeroot builds. Ranges must not
# overlap, so each user gets its own block of apptainer_subid_count IDs.
apptainer_subid_count: 65536
apptainer_fakeroot_users:
  - {user: root, subid_start: 100000}
  - {user: "{{ aero_admin_user }}", subid_start: 165536}

# Stage 09 (ADR-012) — Apptainer signing-key passphrase. The non-interactive
# signer scripts/_apptainer_sign.sh reads the passphrase from
# `aero_apptainer_signing_env` (Vault-rendered). The key + passphrase migrate
# into Vault at `aero_apptainer_signing_vault_path`; the encrypted keyring escrow
# stays on the NAS (/mnt/aero/.keyring-escrow/) and rides the NAS migration. The
# full Vault-Agent render reuses the aero-mlflow pattern — enable per host once
# the AppRole + secret are seeded.
aero_apptainer_signing_env: /etc/aero/apptainer-signing.env
aero_apptainer_signing_vault_path: secret/aero/apptainer-signing
aero_apptainer_signing_vault_enabled: false
