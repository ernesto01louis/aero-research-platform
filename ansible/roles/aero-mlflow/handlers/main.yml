---
# aero-mlflow handlers.

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart vault-agent
  ansible.builtin.systemd:
    name: vault-agent
    state: restarted

- name: Restart minio
  ansible.builtin.systemd:
    name: minio
    state: restarted

- name: Restart mlflow
  ansible.builtin.systemd:
    name: mlflow
    state: restarted
