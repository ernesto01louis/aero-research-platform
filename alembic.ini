# Alembic configuration — schema migrations for the `aero_provenance` database
# on the shared Postgres LXC 202. See ADR-004.
#
# `sqlalchemy.url` is intentionally blank: the connection string carries a
# password (Hard Rule 7 — no secrets in the repo) and is injected at runtime
# from the AERO_PROVENANCE_DSN environment variable in db/env.py.

[alembic]
script_location = db
version_locations = %(here)s/db/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
