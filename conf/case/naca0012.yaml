# NACA 0012 reference case — Re=6e6, M=0.15, AoA 0 deg.
#
# Every `aero.adapters.openfoam.schemas.CaseSpec` field is listed explicitly
# (not left to a pydantic default) so the resolved config — and therefore the
# `config_hash` — covers the complete input set. A pydantic-default change
# would otherwise alter the physics without altering the hash. See ADR-004.
#
# Float exponents carry an explicit sign (`6.0e+6`, not `6.0e6`) so the YAML
# loader parses them as floats rather than strings.

name: naca0012
reynolds: 6.0e+6
mach: 0.15
aoa_deg: 0.0
chord: 1.0
span: 1.0
end_time: 1500
turbulence_model: kOmegaSST
# SIMPLE solver-robustness overrides (null = auto-derived GAMG/0.9/0.7 for this well-conditioned
# sharp-TE reference mesh); the Stage-15 loaded turbulent optimizer case sets PCG + gentler values.
pressure_solver: null
u_relax: null
kw_relax: null
farfield_extent_chords: 100.0
n_surface: 120
n_normal: 120
n_front: 48
n_wake: 72
first_cell_height: 2.0e-6
turbulence_intensity: 0.001
# Sharp TE for the `aero run` path (the verified Stage-05 mesh); the V&V
# hardening case (aero/vv/tmr/naca0012.py) uses the blunt TE. Flip these to
# 0.0025 / 8 once the blunt-TE mesh is cluster-validated (ADR-012).
trailing_edge_thickness: 0.0
n_te: 0
# NACA-4 shape design variables (Stage 15 optimizer). Baseline values recover the
# fixed NACA 0012 exactly (byte-identical mesh); the optimizer perturbs these.
max_camber: 0.0
camber_position: 0.4
max_thickness_frac: 0.12
