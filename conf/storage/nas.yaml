# Stage 09 (ADR-011) — on-prem NAS DVC remote profile.
#
# The future TrueNAS-SCALE native S3 app on the dedicated NAS at 192.168.2.100
# (the parallel-cutover->re-IP migration preserves that IP — see
# docs/runbooks/stage-09-nas-parallel-cutover.md). Running MinIO/S3 natively on
