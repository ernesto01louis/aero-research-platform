# Stage 09 (ADR-011) — cloud-now DVC remote profile: a RunPod network volume.
#
# Operator chose a RunPod network volume (no egress; co-located with the H100
# pods) as the cloud-now home for the ~600 GB DrivAerML subset. It is a LOCAL
# DVC remote on the volume mount: stage the data to it once (a staging pod),
# then training pods `dvc pull -r aero-cloud` read it locally. Flip the default
# to `nas` (conf/config.yaml) after the NAS migration; the on-pod training
# script reads `cfg.storage.dvc_remote`.

dvc_remote: aero-cloud
type: local
path: /runpod-volume/aero-dvc   # RunPod network-volume mount point (pod-side)
s3_endpoint: ""                 # n/a — local remote, not S3
